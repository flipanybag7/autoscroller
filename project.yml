name: AutoScroll
options:
  bundleIdPrefix: com.autoscroll
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.0"

targets:
  AutoScroll:
    type: application
    platform: iOS
    sources:
      - path: AutoScroll
    info:
      path: AutoScroll/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.autoscroll.app
        INFOPLIST_FILE: AutoScroll/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "14.0"
        ENABLE_BITCODE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    preBuildScripts:
      - name: "Clean dSYM"
        script: |
          # Remove dSYM from build to avoid ldid issues on TrollStore
          find "${BUILT_PRODUCTS_DIR}" -name "*.dSYM" -type d -exec rm -rf {} + 2>/dev/null || true
